{% extends "layout/base.html" %}

{% block content %}

<div class="analytics-page">

    <h1>
        Analytics Dashboard 📊
    </h1>

    <div class="stats-grid">

        <div class="stat-card">
            <h3>Total Tasks</h3>
            <h1>{{ total }}</h1>
        </div>

        <div class="stat-card">
            <h3>Completed</h3>
            <h1>{{ completed }}</h1>
        </div>

        <div class="stat-card">
            <h3>Progress</h3>
            <h1>{{ progress }}%</h1>
        </div>

        <div class="stat-card">
            <h3>Current Streak</h3>
            <h1>{{ streak }}</h1>
        </div>

    </div>

    <div class="insight-card">

        <h2>
            🏆 Best Habit
        </h2>

        <p>
            {{ best_habit }}
        </p>

    </div>

    <div class="charts-grid">

    <!-- RADIAL CHART -->

    <div class="chart-card">

        <h2>
            Overall Progress
        </h2>

        <div id="progressRadial"></div>

    </div>

    <!-- AREA CHART -->

    <div class="chart-card">

        <h2>
            Activity Trend
        </h2>

        <div id="activityBar"></div>

    </div>

</div>

</div>

<script>

document.addEventListener(
    "DOMContentLoaded",
    function(){

        // RADIAL PROGRESS

        var radialOptions = {

            series: [{{ progress|default(0) }}],

            chart: {

                type: "radialBar",

                height: 280
            },

            plotOptions: {

                radialBar: {

                    hollow: {

                        size: "70%"
                    },

                    track: {

                        strokeWidth: "100%"
                    },

                    dataLabels: {

                        name: {

                            show: true,

                            fontSize: "18px"
                        },

                        value: {

                            show: true,

                            fontSize: "32px"
                        }
                    }
                }
            },

            labels: [
                "Progress"
            ],

            tooltip: {

                theme: "dark"
            }

        };

        var radialChart = new ApexCharts(

            document.querySelector(
                "#progressRadial"
            ),

            radialOptions

        );

        radialChart.render();

        // ACTIVITY BAR CHART
                
        var barOptions = {

            series: [{

                name: "Completed Tasks",

                data: {{ completion_data|tojson }}
            }],

            chart: {

                type: "bar",

                height: 350,

                toolbar: {

                    show: false
                }
            },

            plotOptions: {

                bar: {

                    borderRadius: 6,

                    columnWidth: "45%"
                }
            },

            dataLabels: {

                enabled: true
            },

            xaxis: {

                categories:
                {{ labels|tojson }}
            },

            yaxis: {

                min: 0,

                forceNiceScale: true,

                labels: {

                    formatter: function(value){

                        return Math.round(value);
                    }
                }
            },

            tooltip: {

                theme: "dark",

                y: {

                    formatter: function(value){

                        return value + " Tasks";
                    }
                }
            }

        };

        var barChart = new ApexCharts(

            document.querySelector(
                "#activityBar"
            ),

            barOptions

        );

        barChart.render();

    }
);

</script>
{% endblock %}
